# dnsmasq main config — baked into image, override by mounting your own to /etc/dnsmasq.conf

# logging to stderr (captured by docker logs)
log-facility=-
log-queries=extra

# DNS basics
domain-needed
bogus-priv
no-resolv
no-poll
expand-hosts

# cache
cache-size=10000
neg-ttl=60

# default upstream(s) — written by entrypoint.sh from $DEFAULT_UPSTREAM
conf-file=/etc/dnsmasq.d/00-upstream.conf

# user-edited static rules (mounted from ./conf/)
conf-file=/opt/dnsmasq-chn/conf/customize.conf

# auto-generated gfw rules — re-read on SIGHUP (servers-file is the only way)
servers-file=/etc/dnsmasq.d/gfw.conf
